name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Установка Node.js на сервер GitHub
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm" # Кэширование ускорит последующие сборки

      # 2. Установка зависимостей из вашего package.json
      - name: Install dependencies
        run: npm ci

      # 3. Запуск команды сборки (создает папку с готовым сайтом)
      - name: Build project
        run: npm run build

      # Настройка GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Загрузка собранной папки
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

      # Публикация на сервера GitHub
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
